<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cartão de Aniversário - Ohana!</title>
    <style>
        /* Estilos base */
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: #e0f7fa; 
            background-image: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI0MCIgaGVpZ2h0PSI0MCIgdmlld0JveD0iMCAwIDQwIDQwIj48ZyBmaWxsLXJ1bGU9ImV2ZW5vZGQiPjxnIGZpbGw9IiM4MWQ0ZmEiIGZpbGwtb3BhY2l0eT0iMC4zIj48cGF0aCBkPSJNMCAwaDQwdjQwSDBWMHptMjAgMjBoMjB2MjBIMjBWMjB6TTAgMjBoMjB2MjBIMFYyMHoyMCAwaDIwdjIwSDIwVjB6Ii8+PC9nPjwvZz48L3N2Zz4=');
            font-family: 'Comic Sans MS', 'Arial', sans-serif;
            overflow: hidden; /* Evita rolagem desnecessária no mobile */
        }

        .card {
            position: relative;
            width: 280px; /* Reduzi um pouco para telas de celulares menores */
            height: 420px;
            cursor: pointer;
            transform-style: preserve-3d;
            transform: perspective(2500px);
            transition: 1s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Abre no hover (computador) ou quando a classe 'open' é adicionada (celular) */
        .card:hover .front, .card.open .front {
            transform: rotateY(-160deg);
        }

        .front {
            background-color: #3f51b5;
            width: 100%;
            height: 100%;
            border-radius: 15px;
            position: absolute;
            z-index: 2;
            transform-origin: left;
            transition: 1.2s;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: 10px 10px 20px rgba(0,0,0,0.3);
            border: 5px solid #fff;
            padding: 20px;
            box-sizing: border-box;
            color: #fff;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            backface-visibility: hidden;
        }

        .stitch-img {
            width: 100%; /* Ajusta ao tamanho do cartão */
            max-width: 240px;
            height: auto;
            margin-bottom: 10px;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.4));
            animation: float 3s infinite ease-in-out;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        .front h1 { font-size: 1.8em; margin: 0; text-align: center; }
        .front p { font-size: 0.8em; opacity: 0.9; margin-top: 5px; }

        .back {
            background-color: #fff;
            width: 100%;
            height: 100%;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
            text-align: center;
            position: absolute;
            z-index: 1;
        }

        .back h2 { color: #3f51b5; font-size: 1.4em; margin-bottom: 5px; }
        .back p { font-size: 1em; color: #444; line-height: 1.3; }
        .quote { font-style: italic; color: #0d47a1; font-weight: bold; margin: 10px 0; font-size: 0.85em; }
        .signature { margin-top: 15px; color: #ff4081; font-weight: bold; }
    </style>
</head>
<body>

    <div class="card" onclick="this.classList.toggle('open')">
        <div class="front">
            <img src="stitch-bolo.png" alt="Stitch no Bolo" class="stitch-img">
            <h1>SURPRESA!</h1>
            <p>Toque para abrir ✨</p>
        </div>
        
        <div class="back">
            <div style="font-size: 40px;">🎁</div>
            <h2>Feliz Aniversário!</h2>
            <p>Que seu dia seja tão doce e alegre quanto o Stitch!</p>
            <p class="quote">"'Ohana quer dizer família. Família quer dizer nunca abandonar ou esquecer."</p>
            <div class="signature">Com muito carinho!</div>
        </div>
    </div>

</body>
</html>
